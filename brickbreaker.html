<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker Pro</title>
    <style>
        body { margin:0; padding:0; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; font-family:'Nunito', sans-serif; color:white; }
        canvas { border:4px solid #7C3AED; box-shadow:0 0 20px rgba(124,58,237,0.5); background:#0a0a0a; max-width:100%; max-height:80vh; height:auto; }
        #ui { position:absolute; top:20px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 10%; box-sizing:border-box; pointer-events:none; }
        .hud { background:rgba(0,0,0,0.8); padding:10px 20px; border-radius:10px; border:2px solid #06B6D4; box-shadow:0 0 10px rgba(6,182,212,0.5); font-weight:bold; font-size:1.2rem; }
        #game-over { position:absolute; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; z-index:10; }
        #game-over.show { opacity:1; pointer-events:all; }
        h1 { color:#F59E0B; text-shadow:0 0 20px #F59E0B; font-size:4rem; margin:0; }
        button { margin-top:30px; padding:15px 30px; background:#F59E0B; color:#000; border:none; border-radius:30px; font-size:1.2rem; font-weight:bold; cursor:pointer; box-shadow:0 0 20px rgba(245,158,11,0.6); transition:transform 0.2s; }
        button:hover { transform:scale(1.1); background:#fff; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hud">Score: <span id="score">0</span></div>
        <div class="hud" style="border-color:#ef4444; box-shadow:0 0 10px rgba(239,68,68,0.5);">Lives: <span id="lives">❤️❤️❤️</span></div>
    </div>
    <div id="game-over">
        <h1 id="go-title">GAME OVER</h1>
        <h2>Score: <span id="final-score">0</span></h2>
        <button onclick="init()">Play Again</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let lives = 3;
        let isGameOver = false;

        let paddle, objBall;
        // Objects arrays
        let balls = [];
        let bricks = [];
        let particles = [];
        let powerups = [];
        let keys = {};

        const paddleWidthInit = 100;
        const paddleHeight = 15;
        const ballRadiusInit = 8;
        const brickRC = { r: 6, c: 10 };
        const brickW = 70;
        const brickH = 20;
        const brickPad = 8;
        const offsetLeft = 15;
        const offsetTop = 50;

        const colors = ['#EF4444', '#F97316', '#FBBF24', '#10B981', '#3B82F6', '#8B5CF6'];

        class Paddle {
            constructor() {
                this.w = paddleWidthInit; this.h = paddleHeight;
                this.x = (canvas.width - this.w)/2; this.y = canvas.height - 30;
                this.dx = 8;
            }
            update() {
                if((keys['ArrowLeft'] || keys['a']) && this.x > 0) this.x -= this.dx;
                if((keys['ArrowRight'] || keys['d']) && this.x < canvas.width - this.w) this.x += this.dx;
            }
            draw() {
                ctx.fillStyle = '#06B6D4';
                ctx.shadowBlur = 15; ctx.shadowColor = '#06B6D4';
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(this.x, this.y, this.w, this.h, 10);
                } else {
                    ctx.rect(this.x, this.y, this.w, this.h);
                }
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Ball {
            constructor(x, y, dx, dy) {
                this.x = x || canvas.width/2; 
                this.y = y || canvas.height - 40;
                this.r = ballRadiusInit;
                this.dx = dx || 4 * (Math.random() > 0.5 ? 1 : -1);
                this.dy = dy || -4;
                this.speed = Math.hypot(this.dx, this.dy);
            }
            update() {
                this.x += this.dx; this.y += this.dy;

                // Walls
                if(this.x + this.dx > canvas.width - this.r || this.x + this.dx < this.r) this.dx = -this.dx;
                if(this.y + this.dy < this.r) this.dy = -this.dy;
                
                // Bottom
                if(this.y + this.dy > canvas.height - this.r) {
                    return true; // Life lost
                }

                // Paddle collision
                if(this.y + this.r >= paddle.y && this.y - this.r <= paddle.y + paddle.h &&
                   this.x >= paddle.x && this.x <= paddle.x + paddle.w) {
                    
                    // Bounce angle based on distance from paddle center
                    let hitPoint = this.x - (paddle.x + paddle.w/2);
                    let normHitPoint = hitPoint / (paddle.w/2);
                    let bounceAngle = normHitPoint * (Math.PI/3); // Max 60 deg
                    
                    this.dx = this.speed * Math.sin(bounceAngle);
                    this.dy = -this.speed * Math.cos(bounceAngle);
                    
                    // Create sparks
                    for(let i=0; i<5; i++) particles.push(new Particle(this.x, this.y, '#06B6D4'));
                }
                return false;
            }
            draw() {
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Brick {
            constructor(c, r) {
                this.x = c * (brickW + brickPad) + offsetLeft;
                this.y = r * (brickH + brickPad) + offsetTop;
                this.status = 1;
                this.color = colors[r % colors.length];
                this.pts = (6-r)*10;
                // Gold brick chance top rows
                if(r < 2 && Math.random() < 0.2) { this.color = '#F59E0B'; this.status = 2; this.pts = 100; }
            }
            draw() {
                if(this.status > 0) {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = this.status === 2 ? 15 : 5; 
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    if (ctx.roundRect) {
                        ctx.roundRect(this.x, this.y, brickW, brickH, 4);
                    } else {
                        ctx.rect(this.x, this.y, brickW, brickH);
                    }
                    ctx.fill();
                    // Detail line
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(this.x+2, this.y+2, brickW-4, 3);
                    ctx.shadowBlur = 0;
                }
            }
        }

        class Powerup {
            constructor(x, y) {
                this.x = x; this.y = y; this.dy = 2;
                this.w = 20; this.h = 20;
                const types = ['wide', 'multi'];
                this.type = types[Math.floor(Math.random()*types.length)];
                this.color = this.type === 'wide' ? '#3B82F6' : '#EF4444';
            }
            update() { this.y += this.dy; }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillStyle = '#000'; ctx.font="12px bold";
                ctx.fillText(this.type==='wide'?'W':'M', this.x+3, this.y+15);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vel = {x:(Math.random()-0.5)*5, y:(Math.random()-0.5)*5};
                this.life = 1; this.decay = Math.random()*0.03 + 0.02;
            }
            update() { this.x += this.vel.x; this.y += this.vel.y; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createBricks() {
            bricks = [];
            for(let c=0; c<brickRC.c; c++) {
                for(let r=0; r<brickRC.r; r++) {
                    bricks.push(new Brick(c, r));
                }
            }
        }

        function init() {
            paddle = new Paddle();
            balls = [new Ball()];
            score = 0; lives = 3; isGameOver = false;
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = '❤️'.repeat(lives);
            document.getElementById('game-over').classList.remove('show');
            createBricks();
            particles = []; powerups = [];
            requestAnimationFrame(loop);
        }

        function collisionDetection() {
            for(let c=0; c<bricks.length; c++) {
                let b = bricks[c];
                if(b.status > 0) {
                    for(let i=0; i<balls.length; i++) {
                        let ball = balls[i];
                        if(ball.x > b.x && ball.x < b.x + brickW && ball.y > b.y && ball.y < b.y + brickH) {
                            ball.dy = -ball.dy;
                            b.status--;
                            
                            // Explosion
                            for(let p=0; p<10; p++) particles.push(new Particle(b.x+brickW/2, b.y+brickH/2, b.color));
                            
                            if(b.status === 0) {
                                score += b.pts;
                                document.getElementById('score').innerText = score;
                                // Powerup drop 10%
                                if(Math.random() < 0.1) powerups.push(new Powerup(b.x+brickW/2, b.y));
                                
                                // Win Check
                                if(bricks.every(br => br.status === 0)) {
                                    endGame(true);
                                }
                            }
                        }
                    }
                }
            }
        }

        function applyPowerup(p) {
            if(p.type === 'wide') {
                paddle.w = Math.min(paddle.w * 1.5, canvas.width - 50);
                setTimeout(()=> paddle.w = paddleWidthInit, 10000); // 10s duration
            } else if (p.type === 'multi') {
                if(balls.length > 0) {
                    let base = balls[0];
                    balls.push(new Ball(base.x, base.y, -base.dx, base.dy));
                    balls.push(new Ball(base.x, base.y, base.dx, -base.dy));
                }
            }
        }

        let screenShake = 0;
        function endGame(win) {
            isGameOver = true;
            document.getElementById('go-title').innerText = win ? "YOU WIN!" : "GAME OVER";
            document.getElementById('go-title').style.color = win ? "#10B981" : "#F59E0B";
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').classList.add('show');
        }

        function loop() {
            if(isGameOver) return;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height); // clear
            
            // Draw gradient background
            let grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, '#111'); grad.addColorStop(1, '#000');
            ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

            paddle.update(); paddle.draw();

            // Balls Update
            for(let i=balls.length-1; i>=0; i--) {
                if(balls[i].update()) {
                    balls.splice(i, 1);
                } else {
                    balls[i].draw();
                }
            }

            // Life management
            if(balls.length === 0) {
                lives--;
                document.getElementById('lives').innerText = '❤️'.repeat(Math.max(0, lives));
                if(lives <= 0) endGame(false);
                else {
                    paddle.x = (canvas.width-paddle.w)/2;
                    balls.push(new Ball());
                }
            }

            // Powerups
            for(let i=powerups.length-1; i>=0; i--) {
                let p = powerups[i];
                p.update(); p.draw();
                
                // Catch powerup
                if(p.y + p.h > paddle.y && p.y < paddle.y + paddle.h &&
                   p.x + p.w > paddle.x && p.x < paddle.x + paddle.w) {
                    applyPowerup(p);
                    powerups.splice(i, 1);
                } else if (p.y > canvas.height) {
                    powerups.splice(i, 1);
                }
            }

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].update(); particles[i].draw();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }

            bricks.forEach(b => b.draw());
            collisionDetection();

            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.key]=true);
        window.addEventListener('keyup', e => keys[e.key]=false);
        // Mouse/Touch
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            let relativeX = (e.clientX - rect.left) * (canvas.width / rect.width);
            if(relativeX > 0 && relativeX < canvas.width) paddle.x = relativeX - paddle.w/2;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); 
            const rect = canvas.getBoundingClientRect();
            let relativeX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            if(relativeX > 0 && relativeX < canvas.width) paddle.x = relativeX - paddle.w/2;
        }, {passive:false});

        init();
    </script>
</body>
</html>
