<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <style>
        body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#0f172a; font-family:'Nunito', sans-serif; color:white; overflow:hidden; }
        
        #game-container { position:relative; display:flex; gap:20px; }
        
        canvas { background:#1e293b; border-radius:10px; border:2px solid #334155; box-shadow:0 0 20px rgba(0,0,0,0.5); cursor:pointer; }
        
        #ui-panel { background:#1e293b; padding:20px; border-radius:10px; border:2px solid #334155; display:flex; flex-direction:column; gap:20px; width:220px; }
        
        .stat-box { background:#0f172a; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; font-size:1.2rem; }
        .gold { color:#f59e0b; }
        .lives { color:#ef4444; }
        .wave { color:#38bdf8; }
        
        .tower-shop { display:flex; flex-direction:column; gap:10px; }
        .tower-btn { background:#334155; border:2px solid transparent; padding:10px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:0.2s; color:white; font-family:inherit; text-align:left;}
        .tower-btn:hover { background:#475569; }
        .tower-btn.selected { border-color:#38bdf8; background:#0f172a; box-shadow:0 0 10px rgba(56,189,248,0.5); }
        .tower-btn.disabled { opacity:0.5; cursor:not-allowed; }
        
        .t-icon { width:30px; height:30px; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:1.2rem; }
        .t-basic { background:#3b82f6; }
        .t-sniper { background:#ef4444; }
        .t-slow { background:#8b5cf6; }
        
        .t-info { display:flex; flex-direction:column; }
        .t-name { font-weight:bold; }
        .t-cost { color:#f59e0b; font-size:0.9rem; }
        
        #game-over { position:absolute; inset:0; background:rgba(15,23,42,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; z-index:10; border-radius:10px;}
        #game-over.show { opacity:1; pointer-events:all; }
        h1 { font-size:3rem; margin:0 0 10px; color:#ef4444; text-shadow:0 0 20px rgba(239,68,68,0.5); font-family:'Fredoka',sans-serif; text-transform:uppercase;}
        h2 { margin:0 0 20px; color:#94a3b8; }
        .btn-action { background:#38bdf8; color:#0f172a; border:none; padding:15px 30px; border-radius:8px; font-weight:bold; font-size:1.2rem; cursor:pointer; font-family:inherit; text-transform:uppercase;}

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div id="ui-panel">
            <div class="stat-box gold">G: <span id="gold">150</span></div>
            <div class="stat-box lives">❤️ <span id="lives">20</span></div>
            <div class="stat-box wave">Wave: <span id="wave">1</span></div>
            
            <hr style="border-color:#334155; margin:10px 0; width:100%;">
            
            <div class="tower-shop">
                <button class="tower-btn selected" id="btn-t1" onclick="selectTower(1, 50)">
                    <div class="t-icon t-basic">🏹</div>
                    <div class="t-info"><span class="t-name">Basic Tower</span><span class="t-cost">50 G</span></div>
                </button>
                <button class="tower-btn" id="btn-t2" onclick="selectTower(2, 100)">
                    <div class="t-icon t-sniper">🎯</div>
                    <div class="t-info"><span class="t-name">Sniper Tower</span><span class="t-cost">100 G</span></div>
                </button>
                <button class="tower-btn" id="btn-t3" onclick="selectTower(3, 80)">
                    <div class="t-icon t-slow">❄️</div>
                    <div class="t-info"><span class="t-name">Slow Tower</span><span class="t-cost">80 G</span></div>
                </button>
            </div>
            
            <button class="btn-action" style="margin-top:auto;" onclick="startWave()" id="start-btn">Start Wave</button>
        </div>
        
        <div id="game-over">
            <h1>BASE DESTROYED</h1>
            <h2>Survived to Wave: <span id="final-wave">0</span></h2>
            <button class="btn-action" onclick="init()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 40;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;

        let gold = 150, lives = 20, wave = 1;
        let isGameOver = false;
        let waveActive = false;
        
        // Define path
        const pathOps = [
            {x:0, y:2}, {x:5, y:2}, {x:5, y:10}, {x:10, y:10}, 
            {x:10, y:4}, {x:14, y:4}, {x:14, y:12}, {x:7, y:12}, {x:7, y:14}, {x:15, y:14}
        ];
        let pathGrid = Array(ROWS).fill().map(()=>Array(COLS).fill(0));
        
        function digPath() {
            let cx = pathOps[0].x, cy = pathOps[0].y;
            pathGrid[cy][cx] = 1;
            for(let i=1; i<pathOps.length; i++) {
                let tx = pathOps[i].x, ty = pathOps[i].y;
                while(cx !== tx || cy !== ty) {
                    if(cx < tx) cx++; else if(cx > tx) cx--;
                    if(cy < ty) cy++; else if(cy > ty) cy--;
                    pathGrid[cy][cx] = 1;
                }
            }
        }
        digPath();

        let towers = [], enemies = [], projectiles = [], particles = [];
        let selectedTowerType = 1;
        let selectedTowerCost = 50;
        let mouseX = 0, mouseY = 0;
        
        const TOWER_STATS = {
            1: { color:'#3b82f6', range: 120, damage: 10, fireRate: 30, bulletSpeed: 6 }, // Basic
            2: { color:'#ef4444', range: 250, damage: 40, fireRate: 90, bulletSpeed: 10 }, // Sniper
            3: { color:'#8b5cf6', range: 100, damage: 5, fireRate: 15, bulletSpeed: 5, slow: 0.5 } // Slow
        };

        class Enemy {
            constructor() {
                this.pathIndex = 0;
                this.x = pathOps[0].x * GRID_SIZE + GRID_SIZE/2;
                this.y = pathOps[0].y * GRID_SIZE + GRID_SIZE/2;
                this.maxHp = 20 + (wave * 15);
                this.hp = this.maxHp;
                this.baseSpeed = 1.5 + (wave * 0.1);
                this.speed = this.baseSpeed;
                this.slowTimer = 0;
                this.r = 10;
                this.reward = 5 + Math.floor(wave/2);
            }
            update() {
                if(this.slowTimer > 0) {
                    this.speed = this.baseSpeed * 0.5;
                    this.slowTimer--;
                } else this.speed = this.baseSpeed;

                let target = pathOps[this.pathIndex + 1];
                if(!target) {
                    // Reached end
                    this.hp = 0;
                    lives--;
                    updateUI();
                    if(lives <= 0) gameOver();
                    return;
                }
                
                let tx = target.x * GRID_SIZE + GRID_SIZE/2;
                let ty = target.y * GRID_SIZE + GRID_SIZE/2;
                
                let dist = Math.hypot(tx-this.x, ty-this.y);
                if(dist < this.speed) {
                    this.x = tx; this.y = ty;
                    this.pathIndex++;
                } else {
                    let angle = Math.atan2(ty-this.y, tx-this.x);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                }
            }
            draw() {
                ctx.fillStyle = this.slowTimer > 0 ? '#67e8f9' : '#10b981'; // Cyan if slow, Green normal
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
                
                // HP Bar
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this.x-10, this.y-15, 20, 4);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x-10, this.y-15, 20 * (this.hp/this.maxHp), 4);
            }
        }

        class Tower {
            constructor(c, r, type) {
                this.c = c; this.r = r;
                this.x = c * GRID_SIZE + GRID_SIZE/2;
                this.y = r * GRID_SIZE + GRID_SIZE/2;
                this.type = type;
                let stats = TOWER_STATS[type];
                this.range = stats.range; this.damage = stats.damage; 
                this.fireRate = stats.fireRate; this.bulletSpeed = stats.bulletSpeed;
                this.color = stats.color;
                this.slow = stats.slow || 0;
                this.cooldown = 0;
                this.angle = 0;
            }
            update() {
                if(this.cooldown > 0) this.cooldown--;
                
                // Find target
                let target = null; let minD = this.range;
                for(let e of enemies) {
                    let d = Math.hypot(e.x-this.x, e.y-this.y);
                    if(d < minD) { minD = d; target = e; }
                }
                
                if(target) {
                    this.angle = Math.atan2(target.y-this.y, target.x-this.x);
                    if(this.cooldown <= 0) {
                        projectiles.push(new Projectile(this.x, this.y, target, this.damage, this.bulletSpeed, this.color, this.slow));
                        this.cooldown = this.fireRate;
                    }
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                
                // Base
                ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
                
                // Cannon
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.fillRect(0, -5, 20, 10);
                ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); // Top bit
                
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x,y,target,dmg,spd,col,slow) {
                this.x=x; this.y=y; this.target=target; this.damage=dmg; this.speed=spd; this.color=col; this.slow=slow;
            }
            update() {
                let dx = this.target.x - this.x; let dy = this.target.y - this.y;
                let dist = Math.hypot(dx,dy);
                if(dist < this.speed) {
                    this.target.hp -= this.damage;
                    if(this.slow) this.target.slowTimer = 60; // 1 sec slow
                    if(this.target.hp <= 0 && this.target.reward > 0) {
                        gold += this.target.reward; this.target.reward = 0; // prevent multi-kill gold
                        updateUI();
                    }
                    // Hit particles
                    for(let i=0; i<3; i++) particles.push({x:this.x,y:this.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, c:this.color});
                    return true; // remove
                }
                this.x += (dx/dist)*this.speed; this.y += (dy/dist)*this.speed;
                return false;
            }
            draw() {
                ctx.fillStyle = this.color; ctx.shadowBlur = 5; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function selectTower(t, cost) {
            selectedTowerType = t; selectedTowerCost = cost;
            document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`btn-t${t}`).classList.add('selected');
        }

        function updateUI() {
            document.getElementById('gold').innerText = gold;
            document.getElementById('lives').innerText = lives;
            document.getElementById('wave').innerText = wave;
            
            [1,2,3].forEach(i => {
                let btn = document.getElementById(`btn-t${i}`);
                let cost = [50, 100, 80][i-1];
                if(gold < cost) btn.classList.add('disabled');
                else btn.classList.remove('disabled');
            });
        }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('click', e => {
            let c = Math.floor(mouseX / GRID_SIZE); let r = Math.floor(mouseY / GRID_SIZE);
            if(c<0||c>=COLS||r<0||r>=ROWS) return;
            
            // Check path
            if(pathGrid[r][c] === 1) return;
            
            // Check existing tower
            for(let t of towers) if(t.c === c && t.r === r) return;
            
            // Buy
            if(gold >= selectedTowerCost) {
                gold -= selectedTowerCost;
                towers.push(new Tower(c, r, selectedTowerType));
                updateUI();
            }
        });

        let enemiesToSpawn = 0;
        let spawnTimer = 0;
        function startWave() {
            if(waveActive) return;
            waveActive = true;
            enemiesToSpawn = 5 + (wave * 3);
            spawnTimer = 60;
            document.getElementById('start-btn').innerText = 'Wave Active';
            document.getElementById('start-btn').style.background = '#64748b';
        }

        function drawMap() {
            // Grass
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for(let i=0; i<=canvas.width; i+=GRID_SIZE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<=canvas.height; i+=GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Path
            ctx.fillStyle = '#475569';
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(pathGrid[r][c] === 1) ctx.fillRect(c*GRID_SIZE, r*GRID_SIZE, GRID_SIZE, GRID_SIZE);
                }
            }
            
            // Base Highlight
            let ex = pathOps[pathOps.length-1].x; let ey = pathOps[pathOps.length-1].y;
            ctx.fillStyle = 'rgba(239,68,68,0.3)'; ctx.fillRect(ex*GRID_SIZE, ey*GRID_SIZE, GRID_SIZE, GRID_SIZE);
        }

        function loop() {
            if(isGameOver) return;
            requestAnimationFrame(loop);
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();

            // Preview placement
            let hc = Math.floor(mouseX / GRID_SIZE); let hr = Math.floor(mouseY / GRID_SIZE);
            if(hc>=0&&hc<COLS&&hr>=0&&hr<ROWS && pathGrid[hr][hc]===0) {
                let overlap = towers.some(t => t.c === hc && t.r === hr);
                if(!overlap) {
                    ctx.fillStyle = gold >= selectedTowerCost ? 'rgba(56,189,248,0.3)' : 'rgba(239,68,68,0.3)';
                    ctx.fillRect(hc*GRID_SIZE, hr*GRID_SIZE, GRID_SIZE, GRID_SIZE);
                    // Draw range circle
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.beginPath(); ctx.arc(hc*GRID_SIZE+GRID_SIZE/2, hr*GRID_SIZE+GRID_SIZE/2, TOWER_STATS[selectedTowerType].range, 0, Math.PI*2); ctx.stroke();
                }
            }

            // Spawn
            if(waveActive && enemiesToSpawn > 0) {
                if(spawnTimer <= 0) {
                    enemies.push(new Enemy());
                    enemiesToSpawn--;
                    spawnTimer = 60 - Math.min(30, wave*2); // Spawns faster later
                } else spawnTimer--;
            }

            towers.forEach(t => { t.update(); t.draw(); });
            
            for(let i=enemies.length-1; i>=0; i--) {
                enemies[i].update();
                enemies[i].draw();
                if(enemies[i].hp <= 0) enemies.splice(i,1);
            }
            
            for(let i=projectiles.length-1; i>=0; i--) {
                projectiles[i].draw();
                if(projectiles[i].update()) projectiles.splice(i,1);
            }
            
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.05;
                if(p.life>0) {
                    ctx.globalAlpha=p.life; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
                } else particles.splice(i,1);
            }
            
            // Wave end
            if(waveActive && enemiesToSpawn === 0 && enemies.length === 0) {
                waveActive = false;
                wave++;
                gold += 50 + (wave * 10); // Wave cleared bonus
                updateUI();
                document.getElementById('start-btn').innerText = `Start Wave ${wave}`;
                document.getElementById('start-btn').style.background = '#38bdf8';
            }
        }
        
        function gameOver() {
            isGameOver = true;
            document.getElementById('final-wave').innerText = wave;
            document.getElementById('game-over').classList.add('show');
        }

        function init() {
            gold = 150; lives = 20; wave = 1;
            towers = []; enemies = []; projectiles = []; particles = [];
            isGameOver = false; waveActive = false;
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('start-btn').innerText = `Start Wave ${wave}`;
            document.getElementById('start-btn').style.background = '#38bdf8';
            updateUI();
            loop(); // re-hook loop on first init
        }

        window.onload = init;
    </script>
</body>
</html>
