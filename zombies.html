<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival</title>
    <style>
        body { margin:0; overflow:hidden; background:#111; font-family:'Nunito', sans-serif; color:white; }
        canvas { display:block; cursor:crosshair; }
        #ui { position:absolute; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; z-index:10; pointer-events:none; }
        .hud-box { background:rgba(0,0,0,0.7); padding:10px 20px; border-radius:10px; border:2px solid; font-weight:bold; font-size:1.5rem; text-shadow:0 0 10px; }
        .wave-box { border-color:#F59E0B; color:#F59E0B; }
        .kill-box { border-color:#ef4444; color:#ef4444; }
        
        #health-bar-container { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:300px; height:20px; background:rgba(0,0,0,0.8); border:2px solid #fff; border-radius:10px; overflow:hidden; z-index:10; }
        #health-bar { height:100%; width:100%; background:linear-gradient(90deg, #ef4444, #10B981); transition:width 0.2s; box-shadow:0 0 10px #10B981 inset; }

        #game-over { position:absolute; inset:0; background:rgba(153, 27, 27, 0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; z-index:20; }
        #game-over.show { opacity:1; pointer-events:all; }
        h1 { color:#fff; font-size:4rem; margin:0; text-shadow:2px 2px 10px #000; text-transform:uppercase; font-family:'Fredoka', sans-serif;}
        .stats { font-size:1.5rem; margin:10px 0; color:#FCA5A5; text-shadow:1px 1px 5px #000;}
        button { margin-top:30px; padding:15px 40px; background:#000; color:#ef4444; border:2px solid #ef4444; border-radius:50px; font-size:1.5rem; font-weight:bold; cursor:pointer; box-shadow:0 0 20px rgba(239,68,68,0.5); transition:all 0.2s; text-transform:uppercase; }
        button:hover { background:#ef4444; color:#fff; box-shadow:0 0 40px rgba(239,68,68,0.8); transform:scale(1.1); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud-box wave-box">WAVE <span id="wave">1</span></div>
        <div class="hud-box kill-box">KILLS: <span id="kills">0</span></div>
    </div>
    
    <div id="health-bar-container"><div id="health-bar"></div></div>

    <div id="game-over">
        <h1>YOU DIED</h1>
        <div class="stats">Survived to Wave: <span id="final-wave">0</span></div>
        <div class="stats">Zombies Killed: <span id="final-kills">0</span></div>
        <button onclick="init()">Try Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let player, zombies, bullets, particles, healthPacks, bloodSplats;
        let wave = 1;
        let kills = 0;
        let frameCount = 0;
        let isGameOver = false;
        let spawnRate = 120; // frames
        let mouseX = w/2, mouseY = h/2;
        let isShooting = false;
        let keys = {};

        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        class Player {
            constructor() {
                this.x = w/2; this.y = h/2;
                this.r = 20; this.speed = 4;
                this.hp = 100; this.maxHp = 100;
                this.angle = 0;
                this.fireRate = 10; this.fireTimer = 0;
            }
            update() {
                // Movement
                let dx=0, dy=0;
                if(keys['w'] || keys['ArrowUp']) dy -= 1;
                if(keys['s'] || keys['ArrowDown']) dy += 1;
                if(keys['a'] || keys['ArrowLeft']) dx -= 1;
                if(keys['d'] || keys['ArrowRight']) dx += 1;
                
                // Normalize diagonal
                if(dx!==0 && dy!==0) { let len = Math.hypot(dx, dy); dx/=len; dy/=len; }
                
                this.x += dx * this.speed;
                this.y += dy * this.speed;
                this.x = Math.max(this.r, Math.min(w-this.r, this.x));
                this.y = Math.max(this.r, Math.min(h-this.r, this.y));

                // Aim
                this.angle = Math.atan2(mouseY - this.y, mouseX - this.x);

                // Shoot
                if(this.fireTimer > 0) this.fireTimer--;
                if(isShooting && this.fireTimer <= 0) {
                    bullets.push(new Bullet(this.x, this.y, this.angle));
                    this.fireTimer = this.fireRate;
                    // Muzzle flash recoil
                    this.x -= Math.cos(this.angle)*2; this.y -= Math.sin(this.angle)*2;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Gun
                ctx.fillStyle = '#666';
                ctx.fillRect(10, -5, 25, 10);
                
                // Body
                ctx.fillStyle = '#3B82F6'; // Blue shirt
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fill();
                
                // Head outline (Top-down view)
                ctx.strokeStyle = '#2563EB'; ctx.lineWidth=3;
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.stroke();

                ctx.restore();
            }
        }

        class Zombie {
            constructor() {
                // Spawn offscreen
                let side = Math.floor(Math.random()*4);
                this.r = 15;
                if(side===0) { this.x = Math.random()*w; this.y = -this.r; }
                else if(side===1) { this.x = w+this.r; this.y = Math.random()*h; }
                else if(side===2) { this.x = Math.random()*w; this.y = h+this.r; }
                else { this.x = -this.r; this.y = Math.random()*h; }
                
                this.hp = 2 + wave;
                let baseSpeed = 1.5 + (wave * 0.2);
                this.speed = baseSpeed + (Math.random()*0.5 - 0.25);
                this.angle = 0;
            }
            update() {
                this.angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Hit player
                if(Math.hypot(this.x-player.x, this.y-player.y) < this.r + player.r) {
                    player.hp -= 0.5;
                    updateHealth();
                    if(player.hp <= 0) gameOver();
                    
                    // Pushback slightly
                    this.x -= Math.cos(this.angle)*5;
                    this.y -= Math.sin(this.angle)*5;
                    
                    // Screen flash red
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                    ctx.fillRect(0,0,w,h);
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Arms extending
                ctx.fillStyle = '#166534';
                ctx.beginPath(); ctx.roundRect(5, -12, 18, 6, 2); ctx.fill();
                ctx.beginPath(); ctx.roundRect(5, 6, 18, 6, 2); ctx.fill();

                // Body
                ctx.fillStyle = '#10B981'; // Green zombie
                ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fill();
                
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle) {
                this.x = x + Math.cos(angle)*15; 
                this.y = y + Math.sin(angle)*15;
                this.velX = Math.cos(angle) * 15;
                this.velY = Math.sin(angle) * 15;
            }
            update() { this.x += this.velX; this.y += this.velY; }
            draw() {
                ctx.fillStyle = '#FCD34D'; // Yellow bullet
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                // Trail
                ctx.strokeStyle = 'rgba(252, 211, 77, 0.5)';
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - this.velX, this.y - this.velY); ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                let angle = Math.random()*Math.PI*2;
                let speed = Math.random()*5+2;
                this.vx = Math.cos(angle)*speed; this.vy = Math.sin(angle)*speed;
                this.life = 1; this.decay = Math.random()*0.05 + 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Splat {
            constructor(x,y) { this.x=x; this.y=y; this.r=Math.random()*15+10; }
            draw() { ctx.fillStyle='rgba(153, 27, 27, 0.4)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); }
        }

        class HealthPack {
            constructor(x,y) { this.x=x; this.y=y; this.r=12; this.pulse=0; }
            update() { this.pulse += 0.1; }
            draw() {
                let s = Math.sin(this.pulse)*2;
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10; ctx.shadowColor = '#10B981';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r + s, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#059669'; ctx.shadowBlur = 0;
                ctx.fillRect(this.x - 2, this.y - 8, 4, 16);
                ctx.fillRect(this.x - 8, this.y - 2, 16, 4);
            }
        }

        function spawnZombies() {
            if(frameCount % spawnRate === 0) {
                // Spawn multiple later waves
                let count = Math.ceil(wave / 2);
                for(let i=0; i<count; i++) zombies.push(new Zombie());
            }
        }

        function checkLevelUp() {
            if(kills > wave * 10 * wave) {
                wave++;
                document.getElementById('wave').innerText = wave;
                spawnRate = Math.max(30, spawnRate - 10); // Spawns faster
            }
        }

        function updateHealth() {
            let pct = Math.max(0, (player.hp / player.maxHp) * 100);
            const hb = document.getElementById('health-bar');
            hb.style.width = pct + '%';
            if(pct > 50) hb.style.background = 'linear-gradient(90deg, #10B981, #34D399)';
            else if(pct > 25) hb.style.background = 'linear-gradient(90deg, #F59E0B, #FCD34D)';
            else hb.style.background = 'linear-gradient(90deg, #ef4444, #FCA5A5)';
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('final-wave').innerText = wave;
            document.getElementById('final-kills').innerText = kills;
            document.getElementById('game-over').classList.add('show');
        }

        function init() {
            player = new Player();
            zombies = []; bullets = []; particles = []; bloodSplats = []; healthPacks = [];
            wave = 1; kills = 0; frameCount = 0; spawnRate = 120;
            isGameOver = false;
            
            document.getElementById('wave').innerText = wave;
            document.getElementById('kills').innerText = kills;
            updateHealth();
            document.getElementById('game-over').classList.remove('show');
            
            loop();
        }

        function handleCollisions() {
            // Bullets hit Zombies
            for(let i=bullets.length-1; i>=0; i--) {
                let b = bullets[i];
                let bHit = false;
                
                // Out of bounds
                if(b.x<0 || b.x>w || b.y<0 || b.y>h) { bullets.splice(i,1); continue; }
                
                for(let j=zombies.length-1; j>=0; j--) {
                    let z = zombies[j];
                    if(Math.hypot(b.x-z.x, b.y-z.y) < z.r + 5) {
                        // Hit
                        for(let p=0; p<5; p++) particles.push(new Particle(b.x, b.y, '#991B1B')); // blood
                        z.hp -= 1;
                        bHit = true;
                        
                        if(z.hp <= 0) {
                            // Dead
                            kills++;
                            document.getElementById('kills').innerText = kills;
                            bloodSplats.push(new Splat(z.x, z.y));
                            for(let p=0; p<15; p++) particles.push(new Particle(z.x, z.y, '#991B1B'));
                            zombies.splice(j, 1);
                            
                            // 5% chance drop health
                            if(Math.random() < 0.05) healthPacks.push(new HealthPack(z.x, z.y));
                            checkLevelUp();
                        }
                        break; // bullet dead
                    }
                }
                if(bHit) bullets.splice(i,1);
            }

            // Player get health
            for(let i=healthPacks.length-1; i>=0; i--) {
                let hp = healthPacks[i];
                if(Math.hypot(hp.x-player.x, hp.y-player.y) < hp.r + player.r) {
                    player.hp = Math.min(player.maxHp, player.hp + 25);
                    updateHealth();
                    
                    // Heal particles
                    for(let p=0; p<20; p++) particles.push(new Particle(player.x, player.y, '#10B981'));
                    healthPacks.splice(i,1);
                }
            }
        }

        function drawGridLayer() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0,0,w,h);
            
            // Floor tiles
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            let sz = 100;
            ctx.beginPath();
            for(let x=0; x<=w; x+=sz) { ctx.moveTo(x,0); ctx.lineTo(x,h); }
            for(let y=0; y<=h; y+=sz) { ctx.moveTo(0,y); ctx.lineTo(w,y); }
            ctx.stroke();
            
            // Blood
            bloodSplats.forEach(s => s.draw());
        }

        function loop() {
            if(isGameOver) return;
            frameCount++;
            
            drawGridLayer();

            healthPacks.forEach(h => { h.update(); h.draw(); });
            
            player.update(); player.draw();
            
            spawnZombies();
            zombies.forEach(z => { z.update(); z.draw(); });
            
            bullets.forEach(b => { b.update(); b.draw(); });
            
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.life<=0) particles.splice(i,1); });
            
            handleCollisions();

            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mousedown', () => isShooting = true);
        window.addEventListener('mouseup', () => isShooting = false);
        
        // Touch auto-aim support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
            isShooting = true;
        }, {passive:false});
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
        }, {passive:false});
        canvas.addEventListener('touchend', () => isShooting = false);

        init();
    </script>
</body>
</html>
