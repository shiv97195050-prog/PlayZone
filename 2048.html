<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Remastered</title>
    <style>
        body { margin:0; display:flex; justify-content:center; align-items:center; background:#0F172A; font-family:'Nunito', sans-serif; min-height:100vh; overflow:hidden; color:#fff; }
        #game-container { width:min(100%, 500px); padding:min(20px, 4vw); box-sizing:border-box; display:flex; flex-direction:column; height:min(100vh, 800px); justify-content:center; }
        
        .header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; }
        h1 { margin:0; font-size:clamp(2rem, 8vw, 3rem); color:#F59E0B; text-shadow:0 0 10px rgba(245,158,11,0.5); font-family:'Fredoka', sans-serif; }
        
        .scores { display:flex; gap:10px; }
        .score-box { background:#1E293B; padding:min(10px, 2vw) min(20px, 4vw); border-radius:10px; text-align:center; min-width:clamp(60px, 15vw, 80px); box-shadow:0 4px 6px rgba(0,0,0,0.3); border:1px solid #334155; }
        .score-title { font-size:clamp(0.6rem, 2vw, 0.8rem); color:#94A3B8; text-transform:uppercase; font-weight:bold; }
        .score-val { font-size:clamp(1rem, 4vw, 1.5rem); font-weight:bold; }
        
        .controls { display:flex; justify-content:space-between; margin-bottom:min(20px, 4vh); }
        .btn { background:#3B82F6; color:white; border:none; padding:min(10px, 2vh) min(20px, 4vw); border-radius:8px; font-weight:bold; cursor:pointer; transition:0.2s; box-shadow:0 0 10px rgba(59,130,246,0.5); font-size:clamp(0.8rem, 3vw, 1rem); }
        .btn:hover { background:#2563EB; transform:translateY(-2px); }
        .btn-undo { background:#8B5CF6; box-shadow:0 0 10px rgba(139,92,246,0.5); }
        .btn-undo:hover { background:#7C3AED; }
        .btn:disabled { background:#475569; box-shadow:none; cursor:not-allowed; transform:none; }

        #grid-container { background:#1E293B; border-radius:15px; padding:min(10px, 2vw); position:relative; width: 100%; aspect-ratio:1/1; box-shadow:inset 0 0 20px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.5); border:2px solid #334155; touch-action:none; }
        
        .grid-bg { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; width:100%; height:100%; position:absolute; inset:min(10px, 2vw); box-sizing:border-box; width:calc(100% - min(20px, 4vw)); height:calc(100% - min(20px, 4vw)); z-index:1; }
        .grid-cell { background:rgba(255,255,255,0.05); border-radius:10px; width:100%; height:100%; }

        .tile-container { position:absolute; inset:min(10px, 2vw); width:calc(100% - min(20px, 4vw)); height:calc(100% - min(20px, 4vw)); z-index:2; pointer-events:none; }
        
        .tile { position:absolute; display:flex; justify-content:center; align-items:center; font-weight:bold; border-radius:10px; transition:transform 0.15s ease-in-out, top 0.15s ease-in-out, left 0.15s ease-in-out; box-shadow:0 4px 8px rgba(0,0,0,0.2); }
        
        .tile-inner { transition: transform 0.2s ease; width:100%; height:100%; display:flex; justify-content:center; align-items:center; border-radius:10px; }
        
        /* Animations */
        @keyframes appear { 0% { opacity:0; transform:scale(0); } 100% { opacity:1; transform:scale(1); } }
        @keyframes pop { 0% { transform:scale(1); } 50% { transform:scale(1.2); } 100% { transform:scale(1); } }
        
        .tile-new .tile-inner { animation: appear 0.2s; }
        .tile-merged .tile-inner { animation: pop 0.2s; }

        /* Colors */
        .color-2 { background:#CBD5E1; color:#334155; font-size:clamp(1.5rem, 6vw, 2.5rem); }
        .color-4 { background:#FDE68A; color:#92400E; font-size:clamp(1.5rem, 6vw, 2.5rem); }
        .color-8 { background:#F97316; color:#fff; font-size:clamp(1.5rem, 6vw, 2.5rem); box-shadow:0 0 10px rgba(249,115,22,0.5); }
        .color-16 { background:#EF4444; color:#fff; font-size:clamp(1.5rem, 6vw, 2.5rem); box-shadow:0 0 15px rgba(239,68,68,0.6); }
        .color-32 { background:#EC4899; color:#fff; font-size:clamp(1.5rem, 6vw, 2.5rem); box-shadow:0 0 15px rgba(236,72,153,0.6); }
        .color-64 { background:#8B5CF6; color:#fff; font-size:clamp(1.5rem, 6vw, 2.5rem); box-shadow:0 0 15px rgba(139,92,246,0.6); }
        .color-128 { background:#3B82F6; color:#fff; font-size:clamp(1.2rem, 5vw, 2rem); box-shadow:0 0 20px rgba(59,130,246,0.7); }
        .color-256 { background:#06B6D4; color:#fff; font-size:clamp(1.2rem, 5vw, 2rem); box-shadow:0 0 20px rgba(6,182,212,0.7); }
        .color-512 { background:#10B981; color:#fff; font-size:clamp(1.2rem, 5vw, 2rem); box-shadow:0 0 20px rgba(16,185,129,0.7); }
        .color-1024 { background:#F59E0B; color:#fff; font-size:clamp(1rem, 4vw, 1.8rem); box-shadow:0 0 25px rgba(245,158,11,0.8); }
        .color-2048 { background:#FEF08A; color:#B45309; font-size:clamp(1rem, 4vw, 1.8rem); box-shadow:0 0 30px rgba(254,240,138,1); border:2px solid #FFFBEB; }
        .color-super { background:#111827; color:#fff; font-size:clamp(0.8rem, 3vw, 1.5rem); box-shadow:0 0 30px #fff; border:2px solid #fff; }

        /* Overlays */
        .overlay { position:absolute; inset:0; background:rgba(15,23,42,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:15px; z-index:10; opacity:0; transition:0.3s; pointer-events:none; }
        .overlay.show { opacity:1; pointer-events:all; }
        .overlay h2 { font-size:clamp(2rem, 10vw, 3rem); margin-bottom:10px; text-shadow:0 0 20px; }
        .win h2 { color:#FCD34D; }
        .lose h2 { color:#EF4444; }
        
        /* Remove static media query */
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-title">Score</div>
                    <div class="score-val" id="score">0</div>
                </div>
                <div class="score-box" style="border-color:#F59E0B; box-shadow:0 0 10px rgba(245,158,11,0.2);">
                    <div class="score-title">Best</div>
                    <div class="score-val" id="best">0</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="init()">Restart</button>
            <button class="btn btn-undo" id="undo-btn" onclick="undo()" disabled>Undo (1)</button>
        </div>

        <div id="grid-container">
            <div class="grid-bg">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <div class="tile-container" id="tile-container"></div>
            
            <div class="overlay win" id="win-screen">
                <h2>YOU WIN!</h2>
                <div>
                    <button class="btn" onclick="keepGoing()" style="margin-right:10px;">Keep Going</button>
                    <button class="btn" onclick="init()">Try Again</button>
                </div>
            </div>
            
            <div class="overlay lose" id="lose-screen">
                <h2>GAME OVER</h2>
                <button class="btn" onclick="init()">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        const size = 4;
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048Best') || 0;
        let won = false;
        let keptGoing = false;
        
        let previousState = null;
        let canUndo = true;

        const tileContainer = document.getElementById('tile-container');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const undoBtn = document.getElementById('undo-btn');
        bestEl.innerText = bestScore;

        function init() {
            grid = Array.from({length:size}, ()=>Array(size).fill(0));
            score = 0; won = false; keptGoing = false;
            canUndo = true; previousState = null;
            updateScore(0);
            updateUndoBtn();
            
            document.getElementById('win-screen').classList.remove('show');
            document.getElementById('lose-screen').classList.remove('show');
            
            addRandom(); addRandom();
            render();
        }

        function addRandom() {
            let empty = [];
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(grid[r][c] === 0) empty.push({r,c});
                }
            }
            if(empty.length > 0) {
                let pos = empty[Math.floor(Math.random()*empty.length)];
                grid[pos.r][pos.c] = { val: Math.random() < 0.9 ? 2 : 4, isNew: true };
            }
        }

        function saveState() {
            previousState = {
                grid: grid.map(row => row.map(cell => cell ? {val:cell.val} : 0)),
                score: score
            };
        }

        function undo() {
            if(!canUndo || !previousState) return;
            grid = previousState.grid;
            score = previousState.score;
            updateScore(0); // refresh
            canUndo = false;
            previousState = null;
            updateUndoBtn();
            document.getElementById('lose-screen').classList.remove('show');
            render();
        }

        function updateUndoBtn() {
            undoBtn.disabled = !canUndo || !previousState;
            undoBtn.innerText = `Undo (${canUndo ? 1 : 0})`;
        }

        function updateScore(add) {
            score += add;
            scoreEl.innerText = score;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048Best', bestScore);
                bestEl.innerText = bestScore;
            }
        }

        function keepGoing() {
            keptGoing = true;
            document.getElementById('win-screen').classList.remove('show');
        }

        function render() {
            tileContainer.innerHTML = '';
            let gap = 10;
            // Need container width/height to calc precise absolute positions
            // Percentage based positioning:
            // width = calc(25% - 7.5px) (assuming gap is 10px, total gap 30)
            
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(grid[r][c] !== 0) {
                        let cell = grid[r][c];
                        let tile = document.createElement('div');
                        
                        let wStr = `calc(25% - 7.5px)`;
                        let leftStr = `calc(${c} * 25% + ${c * 2.5}px)`;
                        let topStr = `calc(${r} * 25% + ${r * 2.5}px)`;
                        
                        tile.className = `tile`;
                        tile.style.width = wStr;
                        tile.style.height = wStr;
                        tile.style.left = leftStr;
                        tile.style.top = topStr;
                        
                        let colorClass = cell.val <= 2048 ? `color-${cell.val}` : `color-super`;
                        
                        let inner = document.createElement('div');
                        inner.className = `tile-inner ${colorClass}`;
                        inner.innerText = cell.val;
                        
                        tile.appendChild(inner);
                        
                        if(cell.isNew) { tile.classList.add('tile-new'); cell.isNew = false; }
                        if(cell.merged) { tile.classList.add('tile-merged'); cell.merged = false; }
                        
                        tileContainer.appendChild(tile);
                    }
                }
            }
        }

        function move(dir) { // 0:up, 1:right, 2:down, 3:left
            let moved = false;
            saveState();

            // Rotate grid so we always slide left
            let temp = rotateGrid(grid, dir);
            let scoreGain = 0;

            for(let r=0; r<size; r++) {
                // Slide
                let arr = temp[r].filter(c => c !== 0);
                
                // Merge
                for(let i=0; i<arr.length-1; i++) {
                    if(arr[i].val === arr[i+1].val) {
                        arr[i] = { val: arr[i].val * 2, merged: true };
                        scoreGain += arr[i].val;
                        
                        if(arr[i].val === 2048 && !won && !keptGoing) won = true;
                        
                        arr.splice(i+1, 1);
                    }
                }
                
                // Pad
                while(arr.length < size) arr.push(0);
                
                for(let c=0; c<size; c++) {
                    // Check if value actually moved or changed
                    let oldVal = temp[r][c] ? temp[r][c].val : 0;
                    let newVal = arr[c] ? arr[c].val : 0;
                    if(oldVal !== newVal) moved = true;
                    temp[r][c] = arr[c];
                }
            }
            
            if(moved) {
                // Rotate back
                grid = rotateGrid(temp, (4 - dir) % 4);
                updateScore(scoreGain);
                addRandom();
                updateUndoBtn();
                render();
                
                if(won && !keptGoing) {
                    setTimeout(()=>document.getElementById('win-screen').classList.add('show'), 500);
                } else if(isGameOver()) {
                    setTimeout(()=>document.getElementById('lose-screen').classList.add('show'), 500);
                }
            } else {
                previousState = null; // discard state if no move
            }
        }

        function rotateGrid(g, times) {
            let res = g;
            for(let i=0; i<times; i++) {
                let temp = Array.from({length:size}, ()=>Array(size).fill(0));
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        temp[c][size-1-r] = res[r][c];
                    }
                }
                res = temp;
            }
            return res;
        }

        function isGameOver() {
            // Check empty
            for(let r=0; r<size; r++) for(let c=0; c<size; c++) if(grid[r][c] === 0) return false;
            // Check merges
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    let v = grid[r][c].val;
                    if(c<size-1 && grid[r][c+1].val === v) return false;
                    if(r<size-1 && grid[r+1][c].val === v) return false;
                }
            }
            return true;
        }

        // Controls
        window.addEventListener('keydown', e => {
            if(['ArrowUp','w','W'].includes(e.key)) { move(0); e.preventDefault(); }
            if(['ArrowRight','d','D'].includes(e.key)) { move(1); e.preventDefault(); }
            if(['ArrowDown','s','S'].includes(e.key)) { move(2); e.preventDefault(); }
            if(['ArrowLeft','a','A'].includes(e.key)) { move(3); e.preventDefault(); }
        });

        // Swipe (Touch)
        let tsX=0, tsY=0;
        let cont = document.getElementById('grid-container');
        cont.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, {passive:true});
        cont.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tsX;
            let dy = e.changedTouches[0].clientY - tsY;
            if(Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if(Math.abs(dx) > Math.abs(dy)) {
                    if(dx > 0) move(1); else move(3);
                } else {
                    if(dy > 0) move(2); else move(0);
                }
            }
        }, {passive:true});

        init();
    </script>
</body>
</html>
